<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة طلبات الزواج - الداعية مدين</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --dark-gold: #8a6d3b;
            --soft-white: #ffffff;
            --luxury-bg: #fdfbf7;
        }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--luxury-bg);
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        .main-card {
            max-width: 650px;
            margin: 0 auto;
            background: var(--soft-white);
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(191, 149, 63, 0.3);
            position: relative;
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 10px;
            background: var(--gold-gradient);
        }

        .profile-header {
            text-align: center;
            padding: 50px 20px 30px;
            background: linear-gradient(to bottom, #fffcf5, #ffffff);
        }

        .img-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 8px;
            background: var(--gold-gradient);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
        }

        h1 { 
            font-family: 'Amiri', serif; 
            color: var(--dark-gold); 
            font-size: 2.5rem; 
            margin: 10px 0;
        }

        .form-body { padding: 0 40px 40px; }

        .shuroot-card {
            background: #fff9eb;
            border: 1px solid #f1e6c9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            text-align: center;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 0.85rem; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            background: #fafafa;
            font-family: 'Noto Kufi Arabic';
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 15px;
            color: #4a370e;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }

        #final-status {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            display: none;
            font-weight: 800;
            font-size: 1.4rem;
        }

        .success { background: #e6ffed; color: #1b5e20; border: 2px solid #2e7d32; }
        .fail { background: #fff0f0; color: #b71c1c; border: 2px solid #c62828; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="profile-header">
        <div class="img-container">
            <!-- تم تعديل السطر ليتوافق مع GitHub -->
            <img src="madin.jpg" id="profilePic" alt="الداعية مدين" onerror="this.src='https://placeholder.com'">
        </div>
        <h1>الداعية مدين</h1>
        <p style="color:#999">بوابة طلبات الزواج الرسمية</p>
    </div>

    <div class="form-body">
        <div class="shuroot-card">
            <strong>الشروط:</strong> عذراء | بشرة فاتحة | العمر (21-25) | الطول (170+) | الوزن (50-)
        </div>

        <div class="grid-inputs">
            <div class="input-group full-width">
                <label>الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخلي اسمك الرباعي">
            </div>

            <div class="input-group">
                <label>العمر</label>
                <input type="number" id="age" placeholder="مثال: 22">
            </div>

            <div class="input-group">
                <label>لون البشرة</label>
                <select id="skin">
                    <option value="white">بيضاء</option>
                    <option value="wheatish">حنطية</option>
                    <option value="dark">سمراء</option>
                </select>
            </div>

            <div class="input-group">
                <label>الطول (سم)</label>
                <input type="number" id="height" placeholder="مثال: 172">
            </div>

            <div class="input-group">
                <label>الوزن (كجم)</label>
                <input type="number" id="weight" placeholder="مثال: 48">
            </div>

            <div class="input-group full-width">
                <label>هل أنتِ عذراء؟</label>
                <select id="virginity">
                    <option value="yes">نعم</option>
                    <option value="no">لا</option>
                </select>
            </div>

            <div class="input-group full-width">
                <label>الوظيفة والثروة التقديرية</label>
                <input type="text" id="assets" placeholder="اذكري تفاصيل وظيفتك وممتلكاتك">
            </div>
        </div>

        <button class="submit-btn" onclick="checkApplication()">تقديم الطلب الآن</button>

        <div id="final-status"></div>
    </div>
</div>

<script>
    function checkApplication() {
        const name = document.getElementById('fullName').value;
        const age = parseInt(document.getElementById('age').value);
        const height = parseInt(document.getElementById('height').value);
        const weight = parseInt(document.getElementById('weight').value);
        const skin = document.getElementById('skin').value;
        const isVirgin = document.getElementById('virginity').value;
        const statusBox = document.getElementById('final-status');

        if(!name) { alert("يرجى كتابة الاسم"); return; }

        let isEligible = true;

        if (age < 21 || age > 25) isEligible = false;
        if (height < 170) isEligible = false;
        if (weight > 50) isEligible = false;
        if (skin === 'dark') isEligible = false;
        if (isVirgin === 'no') isEligible = false;

        statusBox.style.display = "block";

        if(isEligible) {
            statusBox.className = "success";
            statusBox.innerHTML = `مؤهلة للزواج ✅<br><small>أهلاً بك يا ${name}، انطبقت عليك الشروط.</small>`;
        } else {
            statusBox.className = "fail";
            statusBox.innerHTML = `مرفوضة للزواج ❌<br><small>نعتذر منك يا ${name}، لم تكتمل الشروط.</small>`;
        }
    }
</script>

</body>
</html>
