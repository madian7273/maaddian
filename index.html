<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة طلبات الزواج - الداعية مدين</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --dark-gold: #8a6d3b;
            --luxury-bg: #fdfbf7;
        }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--luxury-bg);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .main-card {
            max-width: 600px;
            width: 100%;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(191, 149, 63, 0.2);
            position: relative;
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 12px;
            background: var(--gold-gradient);
        }

        .profile-header {
            text-align: center;
            padding: 60px 20px 20px;
        }

        .img-outer {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 10px;
            background: var(--gold-gradient);
        }

        .img-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #eee;
            overflow: hidden;
            border: 5px solid white;
        }

        .img-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { font-family: 'Amiri', serif; color: var(--dark-gold); font-size: 2.8rem; margin: 10px 0; }
        
        .form-content { padding: 0 40px 50px; }

        .rules-badge {
            background: #fffcf0;
            border: 1px solid #f1e6c9;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #7a631d;
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .full { grid-column: span 2; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #666; font-size: 0.8rem; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #f9f9f9;
            font-family: 'Noto Kufi Arabic';
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--dark-gold); background: #fff; outline: none; }

        .btn-gold {
            width: 100%;
            padding: 20px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 15px;
            color: #4a370e;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(184, 150, 45, 0.2);
        }

        #result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            display: none;
            font-weight: 800;
            font-size: 1.6rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .pass { background: #f0fff4; color: #166534; border: 2px solid #166534; }
        .fail { background: #fff5f5; color: #991b1b; border: 2px solid #991b1b; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="profile-header">
        <div class="img-outer">
            <div class="img-inner">
                <!-- تم تعديل السطر ليتعرف على الاسم الذي يظهر عندك تلقائياً -->
                <img src="madin.jpg.jpeg" id="mainPic" alt="الداعية مدين" 
                     onerror="this.src='madin.jpg'; this.onerror=function(){this.src='madin.png'}">
            </div>
        </div>
        <h1>الداعية مدين</h1>
        <p style="color: #bbb; margin-top: -10px;">بوابة الارتباط الشرعي الرسمية</p>
    </div>

    <div class="form-content">
        <div class="rules-badge">
            📜 <b>المعايير:</b> عذراء | بشرة فاتحة | العمر (21-25) | الطول (170+) | الوزن (50-)
        </div>

        <div class="input-row">
            <div class="full">
                <label>الاسم الكامل</label>
                <input type="text" id="name" placeholder="الاسم الثلاثي">
            </div>
            <div>
                <label>العمر</label>
                <input type="number" id="age" placeholder="21 - 25">
            </div>
            <div>
                <label>لون البشرة</label>
                <select id="skin">
                    <option value="1">بيضاء</option>
                    <option value="1">حنطية</option>
                    <option value="0">سمراء</option>
                </select>
            </div>
            <div>
                <label>الطول (سم)</label>
                <input type="number" id="height" placeholder="170 فأكثر">
            </div>
            <div>
                <label>الوزن (كجم)</label>
                <input type="number" id="weight" placeholder="50 فأقل">
            </div>
            <div class="full">
                <label>الحالة الاجتماعية</label>
                <select id="virgin">
                    <option value="1">عذراء</option>
                    <option value="0">غير ذلك</option>
                </select>
            </div>
            <div class="full">
                <label>الوظيفة ومصادر الثروة</label>
                <textarea id="money" rows="2" placeholder="اذكري الوظيفة والممتلكات بالتفصيل"></textarea>
            </div>
        </div>

        <button class="btn-gold" onclick="evaluateApp()">إرسال الطلب للفحص</button>

        <div id="result-box"></div>
    </div>
</div>

<script>
    function evaluateApp() {
        const n = document.getElementById('name').value;
        const a = parseInt(document.getElementById('age').value);
        const h = parseInt(document.getElementById('height').value);
        const w = parseInt(document.getElementById('weight').value);
        const s = document.getElementById('skin').value;
        const v = document.getElementById('virgin').value;
        const res = document.getElementById('result-box');

        if(!n || !a) { alert("لطفاً أكملي البيانات"); return; }

        let ok = (a >= 21 && a <= 25) && (h >= 170) && (w <= 50) && (s == "1") && (v == "1");

        res.style.display = "block";
        if(ok) {
            res.className = "pass";
            res.innerHTML = `مؤهلة للزواج ✅<br><span style='font-size: 0.9rem; font-weight: 300;'>تم قبول طلبك يا ${n}.</span>`;
        } else {
            res.className = "fail";
            res.innerHTML = `مرفوضة للزواج ❌<br><span style='font-size: 0.9rem; font-weight: 300;'>نعتذر منك يا ${n}، لم تتطابق المعايير.</span>`;
        }
        res.scrollIntoView({behavior: "smooth"});
    }
</script>

</body>
</html>
